                    - img [ref=e457]
                - paragraph [ref=e459]: People who want to describe what they want and have it built correctly — without pretending they're running a 50-person engineering org.
                - paragraph [ref=e460]: "Built-in quality gates catch real problems: schema drift detection flags ORM changes missing migrations, security enforcement anchors verification to threat models, and scope reduction detection prevents the planner from silently dropping your requirements."
