                - paragraph [ref=e443]: Other spec-driven development tools exist; BMAD, Speckit... But they all seem to make things way more complicated than they need to be (sprint ceremonies, story points, stakeholder syncs, retrospectives, Jira workflows) or lack real big picture understanding of what you're building. I'm not a 50-person software company. I don't want to play enterprise theater. I'm just a creative person trying to build great things that work.
                - paragraph [ref=e444]: "So I built GSD. The complexity is in the system, not in your workflow. Behind the scenes: context engineering, XML prompt formatting, subagent orchestration, state management. What you see: a few commands that just work."
                - paragraph [ref=e445]:
                  - text: The system gives Claude everything it needs to do the work
                  - emphasis [ref=e446]: and
                  - text: verify it. I trust the workflow. It just does a good job.
                - paragraph [ref=e447]: That's what this is. No enterprise roleplay bullshit. Just an incredibly effective system for building cool stuff consistently using Claude Code.
                - paragraph [ref=e448]:
                  - text: —
                  - strong [ref=e449]: TÂCHES
                - separator [ref=e450]
                - paragraph [ref=e451]: Vibecoding has a bad reputation. You describe what you want, AI generates code, and you get inconsistent garbage that falls apart at scale.
                - paragraph [ref=e452]: GSD fixes that. It's the context engineering layer that makes Claude Code reliable. Describe your idea, let the system extract everything it needs to know, and let Claude Code get to work.
                - separator [ref=e453]
