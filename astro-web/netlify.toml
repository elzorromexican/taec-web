[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  ASTRO_BUILD_MODE = "server"

[functions."ssr"]
  # Aumentar timeout para TitoBits (Gemini API con knowledge base grande)
  # Netlify Pro/Business soporta hasta 26s; free plan máximo 10s.
  timeout = 26

# Redirecciones 301 para SEO (Páginas deprecadas)
[[redirects]]
  from = "/articulate-ai-assistant"
  to = "/articulate-360-mexico"
  status = 301
  force = true

# Catch-all: cualquier ruta no encontrada como archivo estático
# en dist/ se delega a la función SSR de Astro.
# force = false garantiza que los archivos estáticos siguen teniendo prioridad.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/ssr"
  status = 200
  force = false
