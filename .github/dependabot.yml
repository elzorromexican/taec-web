version: 2
updates:
  # Mantenimiento automático de dependencias (NPM - Astro/React)
  - package-ecosystem: "npm"
    directory: "/astro-web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    assignees:
      - "elzorromexican"

  # Mantenimiento de GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
