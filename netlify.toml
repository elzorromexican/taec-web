[build]
  command = "cd astro-web && npm install && npm run build"
  publish = "astro-web/dist"

[build.environment]
  ASTRO_BUILD_MODE = "server"

# Catch-all: rutas no encontradas como archivo estático en dist/
# se delegan a la función SSR generada por @astrojs/netlify.
# force = false → los archivos estáticos tienen prioridad.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/ssr"
  status = 200
  force = false
